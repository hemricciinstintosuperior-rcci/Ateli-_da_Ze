<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Pedidos | Ateliê da Zê</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body { font-family: 'Poppins', sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        h1 { color: #c59d5f; text-align: center; border-bottom: 2px solid #c59d5f; padding-bottom: 10px; }
        
        .status-conexao { text-align: center; font-size: 0.8rem; margin-bottom: 20px; color: #00ff00; }
        
        #lista-pedidos { display: flex; flex-direction: column; gap: 15px; }
        
        .card-pedido { 
            background: #2c2c2c; border-left: 8px solid #c59d5f; 
            padding: 20px; border-radius: 10px; 
            animation: bounceIn 0.5s ease;
        }

        .horario { font-size: 0.7rem; color: #aaa; }
        .produto { font-size: 1.2rem; font-weight: bold; display: block; margin: 5px 0; }
        .valor { color: #c59d5f; font-weight: bold; }

        @keyframes bounceIn {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <h1>Pedidos do Ateliê</h1>
    <p class="status-conexao">● Monitorando Pedidos em Tempo Real</p>

    <div id="lista-pedidos">
        </div>

    <audio id="somAlerta" preload="auto">
        <source src="https://assets.mixkit.co/sfx/preview/mixkit-software-interface-start-2574.mp3" type="audio/mpeg">
    </audio>

    <script>
        // 1. CONFIGURAÇÃO DO SEU FIREBASE (Coloque seus dados aqui)
        const firebaseConfig = {
            apiKey: "SUA_API_KEY",
            databaseURL: "SUA_DATABASE_URL",
            projectId: "SEU_PROJECT_ID",
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const listaDiv = document.getElementById('lista-pedidos');
        const som = document.getElementById('somAlerta');

        // 2. ESCUTAR O BANCO DE DADOS
        database.ref('pedidos').on('child_added', (snapshot) => {
            const pedido = snapshot.val();
            
            // Tocar o Grito (Alerta)
            som.play().catch(e => console.log("Clique na tela para ativar o som"));

            // Criar o Card na Tela
            const card = document.createElement('div');
            card.className = 'card-pedido';
            card.innerHTML = `
                <span class="horario">${new Date(pedido.data).toLocaleTimeString()}</span>
                <span class="produto">${pedido.produto}</span>
                <span class="valor">${pedido.valor}</span>
            `;
            
            // Adiciona no topo da lista
            listaDiv.prepend(card);
        });
    </script>
</body>
</html>
